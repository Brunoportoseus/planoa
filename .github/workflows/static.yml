      <div class="form-group">
        <label class="form-label">Etapa</label>
        <select class="form-input"><option>Novo Lead</option><option>Qualificado</option><option>Proposta</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Valor do Negócio (R$)</label>
        <input class="form-input" placeholder="0,00">
      </div>
      <div class="form-group">
        <label class="form-label">Canal de Origem</label>
        <select class="form-input"><option>WhatsApp</option><option>Instagram</option><option>E-mail</option><option>Formulário</option></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Observações</label>
      <textarea class="form-input" rows="3" placeholder="Detalhes sobre o lead..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" onclick="closeModal()"><i class="ti ti-check"></i> Salvar Lead</button>
    </div>
  </div>
</div>

<script>
const views = ['dashboard','pipeline','inbox','contacts','reports','automations'];
const titles = { dashboard:'Dashboard', pipeline:'Pipeline de Vendas', inbox:'Inbox — Omnichannel', contacts:'Contatos', reports:'Relatórios & Analytics', automations:'Automações & Salesbot' };

function nav(viewKey, el) {
  views.forEach(v => {
    const el = document.getElementById('view-'+v);
    if (el) el.classList.remove('active');
  });
  const target = document.getElementById('view-'+viewKey);
  if (target) target.classList.add('active');
  document.getElementById('page-title').textContent = titles[viewKey] || viewKey;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  if (viewKey === 'reports') setTimeout(buildChart, 100);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? '' : 'dark');
  document.querySelector('#topbar .btn.icon:last-of-type i').className = isDark ? 'ti ti-sun' : 'ti ti-moon';
}

function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function selectInbox(el, name, initials, color) {
  document.querySelectorAll('.inbox-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  el.classList.remove('unread');
  document.getElementById('chat-av').textContent = initials;
  document.getElementById('chat-av').style.background = color;
  document.getElementById('chat-name').textContent = name;
}

function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const msgs = document.getElementById('chat-messages');
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const div = document.createElement('div');
  div.className = 'msg out';
  div.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${time}</div>`;
  msgs.appendChild(div);
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;
}

function buildChart() {
  const months = ['Dez','Jan','Fev','Mar','Abr','Mai'];
  const revenue = [52, 61, 48, 69, 73, 84];
  const goal = [60, 60, 65, 70, 75, 80];
  const container = document.getElementById('revenue-chart');
  if (!container || container.dataset.built) return;
  container.dataset.built = '1';
  container.innerHTML = '';
  const max = Math.max(...revenue, ...goal);
  months.forEach((m, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'chart-bar-wrap';
    const pct = Math.round((revenue[i]/max)*100);
    const gPct = Math.round((goal[i]/max)*100);
    wrap.innerHTML = `
      <span style="font-size:10px;font-weight:600;color:var(--text2);margin-bottom:4px;">R$${revenue[i]}k</span>
      <div style="position:relative;width:100%;display:flex;gap:3px;height:${gPct}%;">
        <div class="chart-bar" style="flex:1;height:${Math.round((revenue[i]/goal[i])*100)}%;background:var(--accent);align-self:flex-end;" title="Receita: R$${revenue[i]}k"></div>
        <div class="chart-bar" style="flex:1;height:100%;background:var(--green);opacity:0.3;align-self:flex-end;" title="Meta: R$${goal[i]}k"></div>
      </div>
      <span class="chart-label">${m}</span>
    `;
    container.appendChild(wrap);
  });
}

document.getElementById('chat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendMsg();
});
</script>

</body>
</html>
